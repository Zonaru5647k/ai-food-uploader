name: 🤖 AI Food Video Auto Uploader

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install anthropic google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib gspread

      - name: 🚀 Run uploader
        env:
          DRIVE_FOLDER_ID:        ${{ secrets.DRIVE_FOLDER_ID }}
          SHEET_ID:               ${{ secrets.SHEET_ID }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          YOUTUBE_TOKEN_PICKLE:   ${{ secrets.YOUTUBE_TOKEN_PICKLE }}
        run: python main.py
